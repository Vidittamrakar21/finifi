<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three-Way Match Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .status-matched { color: #28a745; font-weight: bold; background: #e8f5e9; padding: 2px 8px; border-radius: 4px; }
        .status-mismatch { color: #dc3545; font-weight: bold; background: #ffebee; padding: 2px 8px; border-radius: 4px; }
        .status-pending { color: #0dcaf0; font-weight: bold; background: #e0f7fa; padding: 2px 8px; border-radius: 4px; }
        .btn-primary { border-radius: 8px; padding: 10px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <h3 class="text-center mb-4 text-primary">Matching Engine Dashboard</h3>
            
            <div class="card p-4 mb-4">
                <h5 class="card-title mb-3">Step 1: Upload Document</h5>
                <form id="uploadForm">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label">Select Document Category</label>
                            <select class="form-select" id="documentType" required>
                                <option value="" disabled selected>Choose type...</option>
                                <option value="po">Purchase Order (PO)</option>
                                <option value="grn">Goods Receipt Note (GRN)</option>
                                <option value="invoice">Invoice</option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Upload PDF File</label>
                            <input type="file" class="form-control" id="fileInput" accept="application/pdf" required>
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary w-100" id="uploadBtn">
                                Extract & Sync Document
                            </button>
                        </div>
                    </div>
                </form>
                <div id="uploadStatus" class="mt-3"></div>
            </div>

            <div class="card p-4">
                <h5 class="card-title mb-3">Step 2: Check Match Status</h5>
                <div class="input-group">
                    <input type="text" id="poSearch" class="form-control" placeholder="Search PO Number (e.g. CI4PO05788)">
                    <button class="btn btn-dark" type="button" onclick="checkMatch()">Fetch Results</button>
                </div>
                
                <div id="matchResult" class="mt-4 d-none">
                    <div class="p-3 border rounded bg-light">
                        <p class="mb-2"><strong>Overall Status:</strong> <span id="resStatus"></span></p>
                        <div id="resReasonsContainer" class="d-none">
                            <p class="mb-1"><strong>Validation Failures:</strong></p>
                            <ul id="resReasons" class="small text-danger"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://localhost:5000";

    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('uploadBtn');
        const statusDiv = document.getElementById('uploadStatus');
        const fileInput = document.getElementById('fileInput');
        const typeInput = document.getElementById('documentType');

        // Prepare Multipart Form Data
        const formData = new FormData();
        // CRITICAL: Append text fields BEFORE the file for Multer compatibility
        formData.append('documentType', typeInput.value); 
        formData.append('file', fileInput.files);

        console.log(formData)

        // UI State: Loading
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Processing with Gemini...`;
        statusDiv.innerHTML = "";

        try {
            const response = await fetch(`${API_URL}/documents/upload`, {
                method: 'POST',
                body: formData // Note: Do NOT set Content-Type header manually for FormData
            });

            const result = await response.json();

            if (response.ok) {
                statusDiv.innerHTML = `
                    <div class="alert alert-success">
                        <strong>Success!</strong> ${typeInput.value.toUpperCase()} processed.<br>
                        <small>Detected PO: ${result.matchResult.poNumber || 'Unknown'}</small>
                    </div>`;
                // Auto-fill the search box for convenience
                if(result.matchResult.poNumber) document.getElementById('poSearch').value = result.matchResult.poNumber;
            } else {
                throw new Error(result.error || "Server failed to process document.");
            }
        } catch (err) {
            statusDiv.innerHTML = `<div class="alert alert-danger"><strong>Error:</strong> ${err.message}</div>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "Extract & Sync Document";
        }
    };

    async function checkMatch() {
        const poNo = document.getElementById('poSearch').value.trim();
        if (!poNo) return alert("Please enter a PO Number first.");

        const resDiv = document.getElementById('matchResult');
        const statusSpan = document.getElementById('resStatus');
        const reasonsList = document.getElementById('resReasons');
        const reasonsCont = document.getElementById('resReasonsContainer');

        try {
            const response = await fetch(`${API_URL}/match/${poNo}`);
            const data = await response.json();

            resDiv.classList.remove('d-none');
            statusSpan.innerText = data.status.toUpperCase();
            
            // Apply Status Styling
            statusSpan.className = data.status.includes('matched') ? 'status-matched' : 
                                   data.status.includes('insufficient') ? 'status-pending' : 'status-mismatch';

            // Populate Reasons
            reasonsList.innerHTML = "";
            if (data.reasons && data.reasons.length > 0 && data.status !== 'matched') {
                reasonsCont.classList.remove('d-none');
                data.reasons.forEach(r => {
                    const li = document.createElement('li');
                    li.innerText = r.replace(/_/g, ' ');
                    reasonsList.appendChild(li);
                });
            } else {
                reasonsCont.classList.add('d-none');
            }
        } catch (err) {
            alert("Could not fetch match data. Is the backend running?");
        }
    }
</script>

</body>
</html>
